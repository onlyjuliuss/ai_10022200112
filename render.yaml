services:
  - type: web
    name: acity-rag
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
