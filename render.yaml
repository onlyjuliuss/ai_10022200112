# Free tier ~512MB RAM: prebuilt data/processed/faiss.index is committed so the app skips PDF ingestion at boot.
# If you still OOM, upgrade the instance or strip optional dependencies.
services:
  - type: web
    name: acity-rag
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      # Set at build time if the SPA is hosted on a different origin than the API.
      # Example: https://your-api.onrender.com — omit or leave unset for same-origin (static served by FastAPI).
      - key: VITE_API_BASE_URL
        sync: false
